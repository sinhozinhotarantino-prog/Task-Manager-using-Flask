name: Pipeline DevSecOps (Etapas 3 e 4)

on:
  push:
    branches: [ "master", "main" ]

jobs:
  sast_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Código
        uses: actions/checkout@v3

      - name: 2. Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 3. Instalar Dependencias e Ferramentas de Seguranca
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety

      - name: 4. Etapa 4 - SAST (Analise Estatica com Bandit)
        run: bandit -r todo_project/ -f screen || true

      - name: 5. Etapa 4 - Analise de Dependencias (com Safety)
        run: safety check -r requirements.txt --full-report || true

      - name: 6. Etapa 3 - Preparar e Build da Imagem Docker
        run: |
          echo 'FROM python:3.11-slim' > Dockerfile
          echo 'WORKDIR /app' >> Dockerfile
          echo 'COPY requirements.txt .' >> Dockerfile
          echo 'RUN pip install --no-cache-dir -r requirements.txt' >> Dockerfile
          echo 'COPY . .' >> Dockerfile
          echo 'EXPOSE 5000' >> Dockerfile
          echo 'CMD ["python3", "todo_project/run.py"]' >> Dockerfile
          docker build -t task-manager-app:latest .
