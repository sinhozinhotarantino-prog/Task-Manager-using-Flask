name: Pipeline DevSecOps (Ate Etapa 5)

on:
  push:
    branches: [ "master", "main" ]

jobs:
  sast_dast_build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Codigo
        uses: actions/checkout@v3

      - name: 2. Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: 3. Instalar Ferramentas de Seguranca
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: 4. Etapa 4 - SAST (Analise Estatica com Bandit)
        run: bandit -r todo_project/ -f screen || true

      - name: 5. Etapa 4 - Analise de Dependencias (com Safety)
        run: safety check -r requirements.txt --full-report || true

      - name: 6. Etapa 3 - Build da Imagem Docker
        run: |
          echo 'FROM python:3.8-slim' > Dockerfile
          echo 'WORKDIR /app' >> Dockerfile
          echo 'COPY . .' >> Dockerfile
          echo 'EXPOSE 5000' >> Dockerfile
          echo 'CMD ["python3", "-m", "http.server", "5000"]' >> Dockerfile
          docker build -t task-manager-app:latest .

      - name: 7. Etapa 5 - DAST (Ataque com OWASP ZAP via IP)
        run: |
          # 1. Subir o contentor da nossa aplicacao
          docker run -d --name app_teste -p 5000:5000 task-manager-app:latest
          sleep 5
          # 2. Descobrir o IP interno do contentor
          APP_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' app_teste)
          echo "Atacar o IP interno: $APP_IP"
          # 3. Mandar o ZAP atacar diretamente o IP descoberto
          docker run ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://$APP_IP:5000 -I || true
