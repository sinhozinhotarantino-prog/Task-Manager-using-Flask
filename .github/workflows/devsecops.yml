name: Pipeline DevSecOps (Ate Etapa 5)

on:
  push:
    branches: [ "master", "main" ]

jobs:
  sast_dast_build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Codigo
        uses: actions/checkout@v3

      - name: 2. Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: 3. Instalar Ferramentas de Seguranca
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: 4. Etapa 4 - SAST (Analise Estatica com Bandit)
        run: bandit -r todo_project/ -f screen || true

      - name: 5. Etapa 4 - Analise de Dependencias (com Safety)
        run: safety check -r requirements.txt --full-report || true

      - name: 6. Etapa 3 - Build da Imagem Docker
        run: |
          echo 'FROM python:3.8-slim' > Dockerfile
          echo 'WORKDIR /app' >> Dockerfile
          echo 'COPY . .' >> Dockerfile
          echo 'RUN pip install -r requirements.txt || true' >> Dockerfile
          echo 'EXPOSE 5000' >> Dockerfile
          echo 'CMD ["python3", "todo_project/run.py"]' >> Dockerfile
          docker build -t task-manager-app:latest .

      - name: 7. Etapa 5 - Subir a Aplicacao para o DAST
        run: |
          docker run -d -p 5000:5000 --name app_teste task-manager-app:latest
          sleep 10

      - name: 8. Etapa 5 - DAST (Ataque com OWASP ZAP)
        run: docker run --network="host" ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://localhost:5000 -I || true
